<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование lab2.js — факториал</title>
    <!-- стили mocha для отображения результатов -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css">
    <!-- сам фреймворк mocha -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script>
    <script>
        // включаем режим тестирования в стиле BDD
        mocha.setup('bdd');
    </script>
    <!-- добавим chai -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script>
    <script>
        // chai предоставляет множество функций. Объявим assert глобально
        let assert = chai.assert;
    </script>
</head>

<body>

    <script>
        'use strict';
        function factorial(n) {
            if (n <= 1) {
                return 1n;
            }
            return BigInt(n) * factorial(n - 1);
        }
    </script>

    <script>
        'use strict';

        describe("factorial", function () {

            it("factorial(0) => 1n", function () {
                assert.strictEqual(factorial(0), 1n);
            });

            it("factorial(5) => 120n", function () {
                assert.strictEqual(factorial(5), 120n);
            });

            // ДОПОЛНИТЕЛЬНЫЙ НЕОБЯЗАТЕЛЬНЫЙ ТЕСТ для проверки других значений
            // (можно удалить, но он показывает корректную работу и даст больше зелёных галочек)
            it("factorial(3) => 6n", function () {
                assert.strictEqual(factorial(3), 6n);
            });

            it("factorial(7) => 5040n", function () {
                assert.strictEqual(factorial(7), 5040n);
            });

        });
    </script>

    <div id="mocha"></div>

    <script>
        mocha.run();
    </script>

</body>

</html>
