<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование lab2.js</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script>
    <script>
        mocha.setup('bdd');
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script>
    <script>
        let assert = chai.assert;
    </script>
</head>

<body>
    <script>
        function pow(base, exponent) {
            if (exponent === 0) return 1;
            if (exponent < 0) return 1 / pow(base, -exponent);
            return base * pow(base, exponent - 1);
        }
    </script>

    <script>
        'use strict';

        describe("pow", function () {

            it("pow(2, 2) => 4", function () {
                assert.strictEqual(pow(2, 2), 4);
            });

            it("pow(2, 0) => 1", function () {
                assert.strictEqual(pow(2, 0), 1);
            });

            it("pow(2, -2) => 0.25", function () {
                assert.strictEqual(pow(2, -2), 0.25);
            });

        });
    </script>

    <div id="mocha"></div>

    <script>
        mocha.run();
    </script>
</body>

</html>
